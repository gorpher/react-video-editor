name: openvideo-editor

services:
  postgres:
    image: postgres:16-alpine
    container_name: openvideo-editor-postgres
    restart: unless-stopped
    # Keep postgres internal-only to avoid host port conflicts and unnecessary exposure.
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_DB: ${POSTGRES_DB:-openvideo_editor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - openvideo-editor-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-openvideo_editor}"]
      interval: 5s
      timeout: 5s
      retries: 30

  web:
    image: openvideo-editor-web:offline
    container_name: openvideo-editor-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      NODE_ENV: production
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-openvideo_editor}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:5000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-replace-with-a-long-random-secret}
      AIFILM_API_BASE_URL: ${AIFILM_API_BASE_URL:-}
      AIFILM_DEV_USER_ID: ${AIFILM_DEV_USER_ID:-}
      DEEPGRAM_URL: ${DEEPGRAM_URL:-https://api.deepgram.com/v1}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      DEEPGRAM_MODEL: ${DEEPGRAM_MODEL:-nova-3}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_URL: ${ELEVENLABS_URL:-https://api.elevenlabs.io}
      ELEVENLABS_MODEL: ${ELEVENLABS_MODEL:-eleven_multilingual_v2}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      R2_PUBLIC_DOMAIN: ${R2_PUBLIC_DOMAIN:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    ports:
      - "${WEB_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5000/projects').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  openvideo-editor-postgres-data:
